name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast:
    name: 🔐 SAST (Security Scan)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run Bandit
      run: bandit app.py -ll

    - name: Run dependency scan
      run: pip-audit


  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: sast

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: pytest --cov=.


  docker:
    name: 🐳 Build Docker Image (Simulation)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t flask-ci-app .

    - name: Save image as artifact (fake push)
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: .


  staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - name: Simulate staging deploy
      run: |
        echo "Deploying to STAGING environment..."
        echo "App version: $GITHUB_SHA"
        sleep 5
        echo "Staging deployment complete ✅"


  production:
    name: 🔥 Deploy to Production
    runs-on: ubuntu-latest
    needs: staging

    steps:
    - name: Simulate production deploy
      run: |
        echo "Deploying to PRODUCTION 🚨"
        echo "Version: $GITHUB_SHA"
        sleep 5
        echo "Production deployment complete 🚀"